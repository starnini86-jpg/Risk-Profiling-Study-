<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financial Wellbeing Conversation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2a2a38;
      --accent: #c9a96e;
      --accent-soft: rgba(201,169,110,0.12);
      --text: #e8e4dc;
      --text-muted: #7a7a8a;
      --user-bg: #1e2a3a;
      --ai-bg: #1a1a22;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,169,110,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100,120,200,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 720px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.8s ease both;
    }

    .header .label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }

    .header p {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.6;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 20px;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8c98a);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Chat window */
    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.8s 0.2s ease both;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .messages {
      padding: 28px 24px;
      min-height: 360px;
      max-height: 460px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 12px;
      animation: msgIn 0.4s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      margin-top: 2px;
    }

    .msg.ai .msg-avatar {
      background: var(--accent-soft);
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--accent);
    }

    .msg.user .msg-avatar {
      background: rgba(100,140,200,0.15);
      border: 1px solid rgba(100,140,200,0.25);
      color: #8aabcc;
    }

    .msg-bubble {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.65;
      font-weight: 300;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(100,140,200,0.2);
      color: var(--text);
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 8px 4px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: pulse 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: rgba(255,255,255,0.02);
    }

    .input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 12px 16px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .input-area textarea::placeholder { color: var(--text-muted); }
    .input-area textarea:focus { border-color: rgba(201,169,110,0.4); }
    .input-area textarea:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      color: #0f0f13;
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.04); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Finish button */
    .finish-wrap {
      text-align: center;
      margin-top: 20px;
      animation: fadeUp 0.5s ease both;
    }

    .finish-btn {
      display: inline-block;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .finish-btn:hover {
      background: var(--accent);
      color: #0f0f13;
    }

    /* Completion screen */
    .completion {
      text-align: center;
      padding: 60px 40px;
      animation: fadeUp 0.6s ease both;
    }

    .completion .checkmark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent-soft);
      border: 1px solid rgba(201,169,110,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 26px;
    }

    .completion h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .completion p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .redirect-btn {
      display: inline-block;
      padding: 16px 48px;
      background: var(--accent);
      color: #0f0f13;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .redirect-btn:hover { opacity: 0.85; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header" id="header">
    <span class="label">Financial Wellbeing Study</span>
    <h1>A Conversation About You & Money</h1>
    <p>There are no right or wrong answers. Speak freely and honestly — this is a safe, confidential space.</p>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span>Conversation progress</span>
      <span id="progressText">0 / 8 exchanges</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">
    <div class="messages" id="messages"></div>
    <div class="input-area" id="inputArea">
      <textarea id="userInput" placeholder="Share your thoughts here…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Finish button (shown after 8 exchanges) -->
  <div class="finish-wrap hidden" id="finishWrap">
    <button class="finish-btn" id="finishBtn">Continue to next part →</button>
  </div>

</div>

<script>
  // ============================================================
  // CONFIGURATION
  // ============================================================
  const OPENAI_API_KEY = "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";
  const QUALTRICS_URL  = "https://maastrichtuniversity.eu.qualtrics.com/jfe/form/SV_6ySu3OmbOjeWChM";
  const MAX_EXCHANGES  = 8; // number of user messages before finish button appears

  // ============================================================
  // SYSTEM PROMPT — Emotional AI Financial Therapist
  // ============================================================
  const SYSTEM_PROMPT = `You are a warm, empathetic financial therapist conducting a research conversation. Your role is to explore the participant's emotional and biographical relationship with money — not their financial goals or investment knowledge.

Your opening message is: "Thank you for taking part in this study. I'd like to start with a simple question: can you tell me about a time when money felt stressful to you? It can be from any point in your life."

Guidelines:
- Ask one question at a time. Never ask multiple questions in one message.
- Follow the emotional thread the participant opens. Go deeper into what they share.
- Explore: childhood memories of money, family attitudes toward wealth, moments of financial fear or security, beliefs about money formed early in life, emotional reactions to financial decisions.
- Never ask standard financial questions (investment horizon, portfolio allocation, risk percentage, etc.).
- Never mention risk tolerance directly. Infer it only from the emotional narrative.
- Be warm, non-judgmental, and genuinely curious. Reflect back what you hear.
- Keep your responses concise — 2 to 4 sentences maximum.
- This is a research study. Maintain a professional yet human tone throughout.`;

  // ============================================================
  // STATE
  // ============================================================
  let conversationHistory = [{ role: "system", content: SYSTEM_PROMPT }];
  let userExchangeCount = 0;
  let isWaiting = false;

  // ============================================================
  // DOM REFERENCES
  // ============================================================
  const messagesEl   = document.getElementById("messages");
  const userInput    = document.getElementById("userInput");
  const sendBtn      = document.getElementById("sendBtn");
  const finishWrap   = document.getElementById("finishWrap");
  const finishBtn    = document.getElementById("finishBtn");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");

  // ============================================================
  // RENDER A MESSAGE
  // ============================================================
  function addMessage(role, text) {
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "ai" ? "✦" : "You";
    if (role === "user") avatar.style.fontSize = "10px";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ============================================================
  // TYPING INDICATOR
  // ============================================================
  function showTyping() {
    const msg = document.createElement("div");
    msg.className = "msg ai";
    msg.id = "typingMsg";

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = "✦";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typingMsg");
    if (el) el.remove();
  }

  // ============================================================
  // UPDATE PROGRESS BAR
  // ============================================================
  function updateProgress() {
    const pct = Math.min((userExchangeCount / MAX_EXCHANGES) * 100, 100);
    progressFill.style.width = pct + "%";
    progressText.textContent = `${userExchangeCount} / ${MAX_EXCHANGES} exchanges`;
  }

  // ============================================================
  // CALL OPENAI API
  // ============================================================
  async function getAIResponse() {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o",
        messages: conversationHistory,
        max_tokens: 200,
        temperature: 0.8
      })
    });

    if (!response.ok) {
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    return data.choices[0].message.content.trim();
  }

  // ============================================================
  // SEND A MESSAGE
  // ============================================================
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isWaiting) return;

    isWaiting = true;
    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    userInput.disabled = true;

    // Show user message
    addMessage("user", text);
    userExchangeCount++;
    updateProgress();

    // Add to history
    conversationHistory.push({ role: "user", content: text });

    // Show typing
    showTyping();

    try {
      const aiText = await getAIResponse();
      hideTyping();
      addMessage("ai", aiText);
      conversationHistory.push({ role: "assistant", content: aiText });

      // Show finish button after MAX_EXCHANGES
      if (userExchangeCount >= MAX_EXCHANGES) {
        finishWrap.classList.remove("hidden");
        userInput.placeholder = "You've completed the conversation. Click 'Continue' below when ready.";
      }

    } catch (err) {
      hideTyping();
      addMessage("ai", "I'm sorry, something went wrong. Please try refreshing the page.");
      console.error(err);
    }

    isWaiting = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }

  // ============================================================
  // AUTO-RESIZE TEXTAREA
  // ============================================================
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
  });

  // ============================================================
  // SEND ON ENTER (SHIFT+ENTER for newline)
  // ============================================================
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ============================================================
  // FINISH BUTTON — redirect back to Qualtrics
  // ============================================================
  finishBtn.addEventListener("click", () => {
    window.location.href = QUALTRICS_URL;
  });

  // ============================================================
  // INIT — fetch first AI message on page load
  // ============================================================
  async function init() {
    sendBtn.disabled = true;
    userInput.disabled = true;
    showTyping();

    try {
      // Prime the conversation with a user-side trigger
      conversationHistory.push({ role: "user", content: "Hello, I'm ready to begin." });
      const opening = await getAIResponse();
      hideTyping();
      addMessage("ai", opening);
      conversationHistory.push({ role: "assistant", content: opening });
    } catch (err) {
      hideTyping();
      addMessage("ai", "Welcome. Can you tell me about a time when money felt stressful to you?");
    }

    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }

  init();
</script>

</body>
</html>
